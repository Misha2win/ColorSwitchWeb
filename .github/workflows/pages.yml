name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - experimental
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-source

      - name: Check out experimental
        uses: actions/checkout@v4
        with:
          ref: experimental
          path: experimental-source

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Assemble branch sites
        run: |
          mkdir -p site/main site/experimental
          cp -R main-source/public/. site/
          cp -R main-source/public/. site/main/
          cp -R experimental-source/public/. site/experimental/
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
