<!DOCTYPE html>
<!-- see: https://www.w3schools.com/graphics/game_components.asp -->
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Color Switch</title>

        <link rel="stylesheet" href="./main.css" />
        <script type="module" src="./js/Editor.js" defer></script>
    </head>
    <body>
        <nav>
            <a href="index.html">Game</a>
        </nav>
        <div id="editor">
            <canvas id="editor-canvas" width="750" height="600"></canvas>
            <div id="level-toolbar" class="button-group">
                <button id="button-play">Play Level</button>
                <button id="button-load">Load Level</button>
                <button id="button-load-string">Load Level String</button>
                <button id="button-save">Save Level</button>
                <button id="button-print-json">Print Level JSON</button>
                <button id="button-help">Help</button>
            </div>
            <div id="entity-toolbar">
                <div id="entity-toolbar-title">Entities</div>
                <div class="button-group">
                    <button class="button-entity" data-type="Spawn">Spawn Point</button>
                </div>
            </div>
            <div id="entity-properties">
                <div id="property-editor-title">Entity Editor</div>
                <form id="property-editor-form">Selected entity properties will go here.</form>
            </div>
            <div id="editor-info">
                <div id="checkbox-debug-mode">
                    <input type="checkbox" id="checkbox-debug" class="checkbox">
                    <label for="checkbox-debug" class="label">Debug Mode</label>
                </div>
            </div>
        </div>
    </body>
</html>
