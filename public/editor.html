<!DOCTYPE html>
<!-- see: https://www.w3schools.com/graphics/game_components.asp -->
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Color Switch</title>

        <link rel="stylesheet" href="./main.css" />
        <script type="module" src="./js/Editor.js" defer></script>
    </head>
    <body class="editor-page">
        <nav>
            <a href="index.html">Game</a>
        </nav>
        <div id="editor">
            <canvas id="editor-canvas" width="750" height="600"></canvas>
            <div id="level-toolbar" class="button-group">
                <div class="toolbar-row toolbar-row-play">
                    <button onclick="this.blur()" id="button-play">Play</button>
                </div>
                <div class="toolbar-row toolbar-row-save">
                    <button onclick="this.blur()" id="button-save" hidden disabled title="Checking save support...">Save</button>
                    <button onclick="this.blur()" id="button-save-as-new">Save As New</button>
                    <button onclick="this.blur()" id="button-create-new">Create New</button>
                </div>
                <div class="toolbar-row toolbar-row-json">
                    <button onclick="this.blur()" id="button-edit-level-order" hidden disabled title="Checking save support...">Edit Order</button>
                    <button onclick="this.blur()" id="button-print-json">Copy JSON</button>
                    <button onclick="this.blur()" id="button-load-string">Load JSON</button>
                </div>
                <div id="selection-action-toolbar">
                    <button onclick="this.blur()" id="button-duplicate-selected" disabled>Duplicate</button>
                    <button onclick="this.blur()" id="button-delete-selected" disabled>Delete</button>
                    <button onclick="this.blur()" id="button-undo-move" disabled title="Undo last move">Undo</button>
                    <button onclick="this.blur()" id="button-redo-move" disabled title="Redo last move">Redo</button>
                </div>
            </div>
            <div id="entity-toolbar">
                <div id="entity-toolbar-title">Entities</div>
                <div id="entity-toolbar-buttons" class="button-group"></div>
            </div>
            <div id="entity-properties">
                <div id="property-editor-title">Entity Editor</div>
                <form id="property-editor-form">Selected entity properties will go here.</form>
            </div>
            <div id="editor-info">
                <div id="checkbox-debug-mode">
                    <input type="checkbox" id="checkbox-debug" class="checkbox">
                    <label for="checkbox-debug" class="label">Debug Mode</label>
                </div>
                <div id="level-navigation">
                    <select id="current-level-label" aria-label="Current level" disabled>
                        <option>Loading levels...</option>
                    </select>
                    <button id="button-previous-level" disabled>←</button>
                    <button id="button-next-level" disabled>→</button>
                </div>
            </div>
            <div id="editor-play-controls" class="editor-play-controls" aria-label="Touch play controls">
                <div class="mobile-control-row mobile-control-row-movement">
                    <button type="button" class="mobile-control-button" data-key="ArrowLeft" aria-label="Move left">←</button>
                    <button type="button" class="mobile-control-button mobile-control-button-primary" data-key="ArrowUp" aria-label="Jump">↑</button>
                    <button type="button" class="mobile-control-button" data-key="ArrowRight" aria-label="Move right">→</button>
                </div>
                <div class="mobile-control-row mobile-control-row-use">
                    <button type="button" class="mobile-control-button" data-key="ShiftLeft" aria-label="Shift">Shift</button>
                    <button type="button" class="mobile-control-button" data-key="Digit1" aria-label="1">1</button>
                    <button type="button" class="mobile-control-button" data-key="Digit2" aria-label="2">2</button>
                    <button type="button" class="mobile-control-button" data-key="Digit3" aria-label="3">3</button>
                    <button type="button" class="mobile-control-button" data-key="KeyE" aria-label="Use item">Use</button>
                </div>
                <div class="mobile-control-row mobile-control-row-restart">
                    <button type="button" class="mobile-control-button" data-key="KeyR" aria-label="Restart level">Restart</button>
                </div>
            </div>
        </div>
    </body>
</html>
