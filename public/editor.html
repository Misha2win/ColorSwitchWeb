<!DOCTYPE html>
<!-- see: https://www.w3schools.com/graphics/game_components.asp -->
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Color Switch</title>

        <link rel="stylesheet" href="./main.css" />
        <script type="module" src="./js/Editor.js" defer></script>
    </head>
    <body>
        <nav>
            <a href="index.html">Game</a>
        </nav>
        <div id="editor">
            <canvas id="editor-canvas" width="750" height="600"></canvas>
            <div id="level-toolbar" class="button-group">
                <button id="button-play">Play Level</button>
                <button id="button-load">Load Level</button>
                <button id="button-load-string">Load Level String</button>
                <button id="button-save">Save Level</button>
                <button id="button-print-json">Print Level JSON</button>
                <button id="button-help">Help</button>
            </div>
            <div id="entity-toolbar">
                <div id="entity-toolbar-title">Entities</div>
                <div class="button-group">
                    <button class="button-entity" data-type="Platform">Platform</button>
                    <button class="button-entity" data-type="MovingPlatform">Moving Platform</button>
                    <button class="button-entity" data-type="FragilePlatform">Fragile Platform</button>
                    <button class="button-entity" data-type="PhotonicPlatform">Photonic Platform</button>
                    <button class="button-entity" data-type="HealthGate">Health Gate</button>
                    <button class="button-entity" data-type="Element">Element</button>
                    <button class="button-entity" data-type="Text">Text</button>
                    <button class="button-entity" data-type="Spawn">Spawn Point</button>
                    <button class="button-entity" data-type="Goal">Goal</button>
                    <button class="button-entity" data-type="Portal">Portal</button>
                    <button class="button-entity" data-type="Prism">Prism</button>
                    <button class="button-entity" data-type="ColorChanger">Color Changer</button>
                    <button class="button-entity" data-type="ColorMixer">Color Mixer</button>
                    <button class="button-entity" data-type="Mirror">Mirror</button>
                    <button class="button-entity" data-type="SuperJump">Super Jump</button>
                    <button class="button-entity" data-type="Teleporter">Teleporter</button>
                </div>
            </div>
            <div id="entity-properties">
                <div id="property-editor-title">Entity Editor</div>
                <form id="property-editor-form">Selected entity properties will go here.</form>
            </div>
            <div id="editor-info">
                <div id="level-color-editor">
                    <label for="select-level-color" class="label">Start Color</label>
                    <select id="select-level-color">
                        <option value="black">black</option>
                        <option value="red">red</option>
                        <option value="green">green</option>
                        <option value="blue">blue</option>
                        <option value="yellow">yellow</option>
                        <option value="magenta">magenta</option>
                        <option value="cyan">cyan</option>
                        <option value="white">white</option>
                        <option value="gray">gray</option>
                    </select>
                </div>
                <div id="checkbox-debug-mode">
                    <input type="checkbox" id="checkbox-debug" class="checkbox">
                    <label for="checkbox-debug" class="label">Debug Mode</label>
                </div>
                <div id="level-navigation">
                    <div id="current-level-label" aria-live="polite">Loading levels...</div>
                    <button id="button-previous-level" disabled>←</button>
                    <button id="button-next-level" disabled>→</button>
                </div>
            </div>
        </div>
    </body>
</html>
